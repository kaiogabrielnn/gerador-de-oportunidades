
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lead Scraper Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; padding: 2rem 1rem; }
  .wrap { max-width: 860px; margin: 0 auto; }
  .page-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: .06em; text-transform: uppercase; color: #aaa; margin-bottom: 10px; }
  .metrics { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #eeecea; border-radius: 8px; padding: 12px 14px; }
  .metric-label { font-size: 12px; color: #666; margin-bottom: 4px; }
  .metric-val { font-size: 22px; font-weight: 500; color: #1a1a18; }
  .metric-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
  .leads-grid { display: grid; gap: 10px; }
  .lead-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 14px 16px; display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: start; transition: border-color .15s; }
  .lead-card:hover { border-color: rgba(0,0,0,0.25); }
  .lead-name { font-size: 15px; font-weight: 500; color: #1a1a18; }
  .lead-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; padding: 3px 9px; border-radius: 99px; border: 0.5px solid; text-decoration: none; }
  .badge-phone { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; }
  .badge-ig { background: #FBEAF0; color: #72243E; border-color: #F4C0D1; }
  .badge-maps { background: #E6F1FB; color: #0C447C; border-color: #B5D4F4; }
  .badge-hours { background: #FAEEDA; color: #854F0B; border-color: #FAC775; }
  .badge-nodata { background: #f1efe8; color: #aaa; border-color: #d3d1c7; }
  .rating-pill { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .stars { font-size: 14px; font-weight: 500; color: #BA7517; }
  .reviews { font-size: 11px; color: #aaa; }
  .rank { display: inline-block; width: 22px; height: 22px; border-radius: 50%; background: #eeecea; font-size: 11px; font-weight: 500; color: #888; text-align: center; line-height: 22px; margin-right: 8px; }
  .filters { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 5px 12px; border-radius: 99px; border: 0.5px solid rgba(0,0,0,0.2); background: transparent; color: #666; cursor: pointer; transition: all .15s; }
  .filter-btn.active { background: #eeecea; color: #1a1a18; border-color: rgba(0,0,0,0.35); }
  .empty { text-align: center; padding: 2rem; color: #aaa; font-size: 14px; }
  .export-row { display: flex; gap: 8px; margin-top: 1.5rem; align-items: center; }
  .export-btn { font-size: 13px; padding: 7px 16px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: transparent; color: #1a1a18; cursor: pointer; }
  .export-btn:hover { background: #eeecea; }
  .tip { font-size: 12px; color: #aaa; margin-left: auto; }
  .search-bar { width: 100%; padding: 8px 12px; margin-bottom: 1rem; font-size: 14px; border-radius: 8px; border: 0.5px solid rgba(0,0,0,0.2); background: #fff; color: #1a1a18; outline: none; }
  .search-bar:focus { border-color: rgba(0,0,0,0.4); }
  @media (max-width: 560px) { .metrics { grid-template-columns: repeat(2, 1fr); } }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #f0ede8; }
    .metric { background: #2c2c2a; }
    .metric-label, .metric-sub { color: #888; }
    .metric-val { color: #f0ede8; }
    .lead-card { background: #242422; border-color: rgba(255,255,255,0.1); }
    .lead-card:hover { border-color: rgba(255,255,255,0.25); }
    .lead-name { color: #f0ede8; }
    .rank { background: #2c2c2a; color: #888; }
    .filter-btn { border-color: rgba(255,255,255,0.2); color: #aaa; }
    .filter-btn.active { background: #2c2c2a; color: #f0ede8; border-color: rgba(255,255,255,0.35); }
    .badge-nodata { background: #2c2c2a; color: #666; border-color: #444; }
    .search-bar { background: #242422; border-color: rgba(255,255,255,0.15); color: #f0ede8; }
    .export-btn { border-color: rgba(255,255,255,0.2); color: #f0ede8; }
    .export-btn:hover { background: #2c2c2a; }
  }
</style>
</head>
<body>
<div class="wrap">
  <p class="page-title">Lead Scraper</p>
  <p class="page-sub">Negócios locais encontrados — ordenados por avaliação</p>

  <p class="section-label">Resumo</p>
  <div class="metrics" id="metrics"></div>

  <input class="search-bar" type="text" id="search" placeholder="Filtrar por nome, telefone..." oninput="renderLeads()">

  <div class="filters">
    <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">Todos</button>
    <button class="filter-btn" data-f="phone" onclick="setFilter('phone',this)">Com telefone</button>
    <button class="filter-btn" data-f="ig" onclick="setFilter('ig',this)">Com Instagram</button>
    <button class="filter-btn" data-f="rated" onclick="setFilter('rated',this)">Avaliação 4+</button>
  </div>

  <div class="leads-grid" id="leads-grid"></div>

  <div class="export-row">
    <button class="export-btn" onclick="exportJSON()">Exportar JSON</button>
    <button class="export-btn" onclick="exportCSV()">Exportar CSV</button>
    <span class="tip" id="export-tip"></span>
  </div>
</div>

<script>
const SAMPLE = [
  { nome:"Clínica Sorriso Perfeito", telefone:"(11) 99999-1111", instagram:"https://instagram.com/sorrisoperfeito", google_maps:"https://maps.google.com/", horario:"Seg-Sex 08:00–18:00", avaliacao:4.8, num_reviews:312 },
  { nome:"OdontoVida Centro", telefone:"(11) 3322-5500", instagram:"https://instagram.com/odontovida", google_maps:"https://maps.google.com/", horario:"Seg-Sáb 07:30–19:00", avaliacao:4.6, num_reviews:198 },
  { nome:"Consultório Dr. Figueiredo", telefone:"(11) 98765-4321", instagram:"", google_maps:"https://maps.google.com/", horario:"Ter-Sex 09:00–17:00", avaliacao:4.5, num_reviews:87 },
  { nome:"DenteSano Odontologia", telefone:"", instagram:"https://instagram.com/dentesano_sp", google_maps:"https://maps.google.com/", horario:"Seg-Sex 08:00–17:00", avaliacao:4.3, num_reviews:54 },
  { nome:"Smile Studio Premium", telefone:"(11) 91234-5678", instagram:"https://instagram.com/smilestudio.sp", google_maps:"https://maps.google.com/", horario:"Seg-Sex 08:00–20:00 | Sáb 08:00–13:00", avaliacao:4.7, num_reviews:421 },
  { nome:"Centro Dental Paraíso", telefone:"(11) 3333-7700", instagram:"", google_maps:"https://maps.google.com/", horario:"", avaliacao:3.9, num_reviews:22 },
  { nome:"Odonto Express 24h", telefone:"(11) 94567-8901", instagram:"https://instagram.com/odontoexpress24", google_maps:"https://maps.google.com/", horario:"24 horas", avaliacao:4.1, num_reviews:133 },
];

let activeFilter = 'all';

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderLeads();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  return SAMPLE.filter(l => {
    const matchQ = !q || l.nome.toLowerCase().includes(q) || l.telefone.includes(q);
    if (!matchQ) return false;
    if (activeFilter === 'phone') return !!l.telefone;
    if (activeFilter === 'ig') return !!l.instagram;
    if (activeFilter === 'rated') return l.avaliacao >= 4;
    return true;
  });
}

function renderMetrics(all) {
  const withPhone = all.filter(l => l.telefone).length;
  const withIg = all.filter(l => l.instagram).length;
  const avgRating = all.length ? (all.reduce((s,l) => s + l.avaliacao, 0) / all.length).toFixed(1) : '-';
  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Total de leads</div><div class="metric-val">${all.length}</div><div class="metric-sub">negócios encontrados</div></div>
    <div class="metric"><div class="metric-label">Com telefone</div><div class="metric-val">${withPhone}</div><div class="metric-sub">${Math.round(withPhone/all.length*100)}% do total</div></div>
    <div class="metric"><div class="metric-label">Com Instagram</div><div class="metric-val">${withIg}</div><div class="metric-sub">${Math.round(withIg/all.length*100)}% do total</div></div>
    <div class="metric"><div class="metric-label">Avaliação média</div><div class="metric-val">${avgRating}</div><div class="metric-sub">estrelas (Google)</div></div>
  `;
}

function renderLeads() {
  const list = getFiltered();
  renderMetrics(SAMPLE);
  const grid = document.getElementById('leads-grid');
  if (!list.length) { grid.innerHTML = '<div class="empty">Nenhum lead encontrado com esses filtros.</div>'; return; }
  grid.innerHTML = list.map((l, i) => `
    <div class="lead-card">
      <div>
        <div class="lead-name"><span class="rank">${i+1}</span>${l.nome}</div>
        <div class="lead-meta">
          ${l.telefone ? `<span class="badge badge-phone">📞 ${l.telefone}</span>` : '<span class="badge badge-nodata">Sem telefone</span>'}
          ${l.instagram ? `<a href="${l.instagram}" target="_blank"><span class="badge badge-ig">@ Instagram</span></a>` : '<span class="badge badge-nodata">Sem Instagram</span>'}
          <a href="${l.google_maps}" target="_blank"><span class="badge badge-maps">Maps</span></a>
          ${l.horario ? `<span class="badge badge-hours">${l.horario.split('|')[0].trim()}</span>` : ''}
        </div>
      </div>
      <div class="rating-pill">
        <span class="stars">★ ${l.avaliacao}</span>
        <span class="reviews">${l.num_reviews} avaliações</span>
      </div>
    </div>
  `).join('');
}

function exportJSON() {
  const data = JSON.stringify(getFiltered(), null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'leads.json'; a.click();
  showTip('JSON baixado!');
}

function exportCSV() {
  const cols = ['nome','telefone','instagram','google_maps','horario','avaliacao','num_reviews'];
  const rows = [cols.join(','), ...getFiltered().map(l => cols.map(c => `"${(l[c]||'').toString().replace(/"/g,'""')}"`).join(','))];
  const blob = new Blob([rows.join('
')], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'leads.csv'; a.click();
  showTip('CSV baixado!');
}

function showTip(msg) {
  const t = document.getElementById('export-tip');
  t.textContent = msg;
  setTimeout(() => t.textContent = '', 3000);
}

renderLeads();
</script>
</body>
</html>
